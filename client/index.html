      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      // Donker als standaard, voor de app mount: voorkomt een korte lichtflits.
      // Respecteert een eerder bewust gekozen lichte modus (bewaarde voorkeur).
      (function () {
        try {
          var __ls = window["local" + "Storage"];
          var t = __ls ? __ls.getItem("tapas_theme") : null;
          if (t !== "light") document.documentElement.classList.add("dark");
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Vangnet voor een verouderde versie in de browser: als de app na 6 s nog
      // niet is gemount (bv. doordat een oude bundle naar een verwijderd bestand
      // wijst), herlaad dan éénmalig hard met cache-buster. Voorkomt een leeg scherm.
      (function () {
        setTimeout(function () {
          var __ss = null;
          try { __ss = window["session" + "Storage"]; } catch (e) { __ss = null; }
          var root = document.getElementById("root");
          var leeg = !root || root.childElementCount === 0;
          var alHerladen = __ss ? __ss.getItem("tapas_recovered") === "1" : false;
          if (leeg && !alHerladen) {
            if (__ss) __ss.setItem("tapas_recovered", "1");
            var u = new URL(window.location.href);
            u.searchParams.set("_r", String(Date.now()));
            window.location.replace(u.toString());
          } else if (!leeg) {
            if (__ss) __ss.removeItem("tapas_recovered");
          }
        }, 6000);
      })();
    </script>
  </body>
</html>
