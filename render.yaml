services:
  - type: web
    name: tapas-platform-demo
    runtime: node
    region: frankfurt
    plan: free
    nodeVersion: 20.19.0

    buildCommand: pip3 install -r requirements.txt && npm install --legacy-peer-deps && npm run build
    startCommand: node dist/index.cjs

    envVars:
      - key: NODE_ENV
        value: production
      # VITE_DEMO_MODE is ingebakken via .env.production tijdens de build (DEMO_MODE=true)
      # PORT wordt automatisch door Render geïnjecteerd op 10000 — niet overschrijven
